name: memesee

services:
  mysql:
    image: mysql:8.4
    container_name: memesee-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_APP_USERNAME: ${MYSQL_APP_USERNAME:-memesee_app}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD:?set MYSQL_APP_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: memesee-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: memesee-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-memesee}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env}
    ports:
      - "127.0.0.1:${RABBITMQ_HOST_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: memesee-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: memesee-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      CONTENT_MEDIA_MINIO_BUCKET: ${CONTENT_MEDIA_MINIO_BUCKET:-memesee-post-images}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$CONTENT_MEDIA_MINIO_BUCKET"
        mc anonymous set download "local/$$CONTENT_MEDIA_MINIO_BUCKET"
    restart: "no"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: memesee-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    ports:
      - "127.0.0.1:${MEILI_HOST_PORT:-7700}:7700"
    volumes:
      - meilisearch-data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7700/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: user-service
    container_name: memesee-user-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      USER_DB_URL: jdbc:mysql://mysql:3306/memesee_user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      USER_DB_USERNAME: ${MYSQL_APP_USERNAME:-memesee_app}
      USER_DB_PASSWORD: ${MYSQL_APP_PASSWORD:?set MYSQL_APP_PASSWORD in .env}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:?set APP_SECURITY_JWT_SECRET in .env}
      APP_SECURITY_JWT_EXPIRATION_SECONDS: ${APP_SECURITY_JWT_EXPIRATION_SECONDS:-86400}
      APP_SECURITY_INTERNAL_SERVICE_TOKEN: ${APP_SECURITY_INTERNAL_SERVICE_TOKEN:?set APP_SECURITY_INTERNAL_SERVICE_TOKEN in .env}
    expose:
      - "8081"

  content-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: content-service
    container_name: memesee-content-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONTENT_DB_URL: jdbc:mysql://mysql:3306/memesee_content?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      CONTENT_DB_USERNAME: ${MYSQL_APP_USERNAME:-memesee_app}
      CONTENT_DB_PASSWORD: ${MYSQL_APP_PASSWORD:?set MYSQL_APP_PASSWORD in .env}
      MEMESEE_REDIS_HOST: redis
      MEMESEE_REDIS_PORT: 6379
      MEMESEE_REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
      MEMESEE_RABBITMQ_HOST: rabbitmq
      MEMESEE_RABBITMQ_PORT: 5672
      MEMESEE_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-memesee}
      MEMESEE_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env}
      USER_SERVICE_URL: http://user-service:8081
      APP_SECURITY_JWT_SECRET: ${APP_SECURITY_JWT_SECRET:?set APP_SECURITY_JWT_SECRET in .env}
      APP_SECURITY_INTERNAL_SERVICE_TOKEN: ${APP_SECURITY_INTERNAL_SERVICE_TOKEN:?set APP_SECURITY_INTERNAL_SERVICE_TOKEN in .env}
      CONTENT_SEARCH_MEILISEARCH_URL: http://meilisearch:7700
      CONTENT_SEARCH_MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY in .env}
      CONTENT_MEDIA_MINIO_ENDPOINT: http://minio:9000
      CONTENT_MEDIA_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      CONTENT_MEDIA_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      CONTENT_MEDIA_MINIO_BUCKET: ${CONTENT_MEDIA_MINIO_BUCKET:-memesee-post-images}
      CONTENT_MEDIA_PROCESSING_ASYNC_ENABLED: ${CONTENT_MEDIA_PROCESSING_ASYNC_ENABLED:-true}
      CONTENT_MEDIA_DIRECT_DELIVERY_ENABLED: ${CONTENT_MEDIA_DIRECT_DELIVERY_ENABLED:-true}
      CONTENT_MEDIA_PUBLIC_BASE_URL: ${CONTENT_MEDIA_PUBLIC_BASE_URL:-https://memesee.world/media}
      CONTENT_MEDIA_MAX_BYTES: ${CONTENT_MEDIA_MAX_BYTES:-20971520}
      CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_ENABLED: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_ENABLED:-true}
    expose:
      - "8083"

  media-worker:
    build:
      context: ./media-worker
      dockerfile: Dockerfile
    container_name: memesee-media-worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      MEDIA_WORKER_RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-memesee}:${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env}@rabbitmq:5672
      MEDIA_WORKER_QUEUE: ${CONTENT_MEDIA_PROCESSING_QUEUE:-memesee.media.variant-processing}
      MEDIA_WORKER_CONCURRENCY: ${MEDIA_WORKER_CONCURRENCY:-2}
      MEDIA_WORKER_DB_HOST: mysql
      MEDIA_WORKER_DB_PORT: 3306
      MEDIA_WORKER_DB_NAME: memesee_content
      MEDIA_WORKER_DB_USERNAME: ${MYSQL_APP_USERNAME:-memesee_app}
      MEDIA_WORKER_DB_PASSWORD: ${MYSQL_APP_PASSWORD:?set MYSQL_APP_PASSWORD in .env}
      MEDIA_WORKER_MINIO_ENDPOINT: minio
      MEDIA_WORKER_MINIO_PORT: 9000
      MEDIA_WORKER_MINIO_USE_SSL: "false"
      MEDIA_WORKER_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MEDIA_WORKER_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      MEDIA_WORKER_MINIO_BUCKET: ${CONTENT_MEDIA_MINIO_BUCKET:-memesee-post-images}
      MEDIA_WORKER_PUBLIC_BASE_URL: ${CONTENT_MEDIA_PUBLIC_BASE_URL:-https://memesee.world/media}
      MEDIA_WORKER_REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/0

  gateway-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway-service
    container_name: memesee-gateway-service
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_started
      content-service:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      USER_SERVICE_URL: http://user-service:8081
      CONTENT_SERVICE_URL: http://content-service:8083
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://memesee.world}
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: memesee-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3000}:80"

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  meilisearch-data:
