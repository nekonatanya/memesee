debug: false

spring:
  datasource:
    url: ${CONTENT_DB_URL}
    username: ${CONTENT_DB_USERNAME}
    password: ${CONTENT_DB_PASSWORD}
  data:
    redis:
      host: ${MEMESEE_REDIS_HOST}
      port: ${MEMESEE_REDIS_PORT}
      username: ${MEMESEE_REDIS_USERNAME:}
      password: ${MEMESEE_REDIS_PASSWORD}
      database: ${MEMESEE_REDIS_DATABASE:0}
      ssl:
        enabled: ${MEMESEE_REDIS_SSL_ENABLED:false}
  rabbitmq:
    host: ${MEMESEE_RABBITMQ_HOST:127.0.0.1}
    port: ${MEMESEE_RABBITMQ_PORT:5672}
    username: ${MEMESEE_RABBITMQ_USERNAME:memesee}
    password: ${MEMESEE_RABBITMQ_PASSWORD:}
    virtual-host: ${MEMESEE_RABBITMQ_VHOST:/}

app:
  user-service:
    url: ${USER_SERVICE_URL}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
    internal:
      service-token: ${APP_SECURITY_INTERNAL_SERVICE_TOKEN}
  outbox:
    processor:
      enabled: true
      distributed-lock:
        enabled: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_ENABLED:true}
  search:
    meilisearch:
      url: ${CONTENT_SEARCH_MEILISEARCH_URL}
      api-key: ${CONTENT_SEARCH_MEILISEARCH_API_KEY}
      index-uid: ${CONTENT_SEARCH_MEILISEARCH_INDEX_UID:main-posts}
  media:
    processing:
      async-enabled: ${CONTENT_MEDIA_PROCESSING_ASYNC_ENABLED:false}
      queue:
        exchange: ${CONTENT_MEDIA_PROCESSING_EXCHANGE:memesee.media}
        name: ${CONTENT_MEDIA_PROCESSING_QUEUE:memesee.media.variant-processing}
        routing-key: ${CONTENT_MEDIA_PROCESSING_ROUTING_KEY:media.variant.process}
        dead-letter-exchange: ${CONTENT_MEDIA_PROCESSING_DLX:memesee.media.dlx}
        dead-letter-name: ${CONTENT_MEDIA_PROCESSING_DLQ:memesee.media.variant-processing.dlq}
        dead-letter-routing-key: ${CONTENT_MEDIA_PROCESSING_DLQ_ROUTING_KEY:media.variant.process.dead}
        max-attempts: ${CONTENT_MEDIA_PROCESSING_MAX_ATTEMPTS:3}
        initial-interval-ms: ${CONTENT_MEDIA_PROCESSING_RETRY_INITIAL_MS:1000}
        multiplier: ${CONTENT_MEDIA_PROCESSING_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${CONTENT_MEDIA_PROCESSING_RETRY_MAX_MS:10000}
    storage:
      minio:
        endpoint: ${CONTENT_MEDIA_MINIO_ENDPOINT}
        access-key: ${CONTENT_MEDIA_MINIO_ACCESS_KEY}
        secret-key: ${CONTENT_MEDIA_MINIO_SECRET_KEY}
        bucket-name: ${CONTENT_MEDIA_MINIO_BUCKET:memesee-post-images}
        direct-delivery-enabled: ${CONTENT_MEDIA_DIRECT_DELIVERY_ENABLED:false}
        public-base-url: ${CONTENT_MEDIA_PUBLIC_BASE_URL:}
