debug: false

server:
  port: 8080

spring:
  application:
    name: gateway-service
  codec:
    max-in-memory-size: 350MB
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # Keep localhost, plus common LAN origins for mobile testing.
            allowedOriginPatterns:
              - ${FRONTEND_ORIGIN:http://localhost:5173}
              - "http://localhost:*"
              - "http://127.0.0.1:*"
              - "http://192.168.*:*"
              - "http://10.*:*"
              - "http://172.*:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: content-service-communities
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/communities/**
        - id: content-service-main-posts
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/main-posts/**
        - id: content-service-feed
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/feed,/api/feed/**
        - id: content-service-sub-posts
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/sub-posts/**
        - id: content-service-media-assets
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/media-assets/**
        - id: content-service-notifications
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/notifications/**
        - id: content-service-me
          uri: ${CONTENT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/me/**

logging:
  level:
    org.springframework.cloud.gateway: INFO
