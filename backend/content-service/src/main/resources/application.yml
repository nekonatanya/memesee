debug: false

server:
  port: 8083

spring:
  application:
    name: content-service
  datasource:
    url: ${CONTENT_DB_URL:jdbc:mysql://127.0.0.1:3307/memesee_content?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${CONTENT_DB_USERNAME:memesee_app}
    password: ${CONTENT_DB_PASSWORD:memesee_app_password}
  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 320MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  jackson:
    time-zone: UTC
  data:
    redis:
      host: ${MEMESEE_REDIS_HOST:127.0.0.1}
      port: ${MEMESEE_REDIS_PORT:6379}
      username: ${MEMESEE_REDIS_USERNAME:}
      password: ${MEMESEE_REDIS_PASSWORD:}
      database: ${MEMESEE_REDIS_DATABASE:0}
      timeout: ${MEMESEE_REDIS_TIMEOUT:3s}
      connect-timeout: ${MEMESEE_REDIS_CONNECT_TIMEOUT:3s}
      ssl:
        enabled: ${MEMESEE_REDIS_SSL_ENABLED:false}
app:
  user-service:
    url: ${USER_SERVICE_URL:http://127.0.0.1:8081}
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:${JWT_SECRET:change_me_to_a_long_secret_at_least_32_chars}}
    internal:
      service-token: ${APP_SECURITY_INTERNAL_SERVICE_TOKEN:${USER_INTERNAL_SERVICE_TOKEN:change_me_internal_service_token}}
  outbox:
    processor:
      enabled: ${CONTENT_OUTBOX_PROCESSOR_ENABLED:true}
      batch-size: ${CONTENT_OUTBOX_PROCESSOR_BATCH_SIZE:20}
      fixed-delay-ms: ${CONTENT_OUTBOX_PROCESSOR_DELAY_MS:5000}
      failed-retry:
        enabled: ${CONTENT_OUTBOX_FAILED_RETRY_ENABLED:true}
        batch-size: ${CONTENT_OUTBOX_FAILED_RETRY_BATCH_SIZE:20}
        max-attempts: ${CONTENT_OUTBOX_FAILED_RETRY_MAX_ATTEMPTS:5}
        delay: ${CONTENT_OUTBOX_FAILED_RETRY_DELAY:PT10S}
      distributed-lock:
        enabled: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_ENABLED:false}
        key: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_KEY:memesee:lock:content:outbox:processor}
        wait-time: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_WAIT_TIME:PT0S}
        lease-time: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_LEASE_TIME:PT30S}
        fail-open: ${CONTENT_OUTBOX_PROCESSOR_DISTRIBUTED_LOCK_FAIL_OPEN:false}
  search:
    meilisearch:
      url: ${CONTENT_SEARCH_MEILISEARCH_URL:http://127.0.0.1:7700}
      api-key: ${CONTENT_SEARCH_MEILISEARCH_API_KEY:memesee_master_key}
      index-uid: ${CONTENT_SEARCH_MEILISEARCH_INDEX_UID:main-posts}
  media:
    storage:
      minio:
        endpoint: ${CONTENT_MEDIA_MINIO_ENDPOINT:http://127.0.0.1:9000}
        access-key: ${CONTENT_MEDIA_MINIO_ACCESS_KEY:minioadmin}
        secret-key: ${CONTENT_MEDIA_MINIO_SECRET_KEY:minioadmin}
        bucket-name: ${CONTENT_MEDIA_MINIO_BUCKET:memesee-post-images}
        auto-create-bucket: ${CONTENT_MEDIA_MINIO_AUTO_CREATE_BUCKET:true}
    upload:
      max-file-size-bytes: ${CONTENT_MEDIA_MAX_BYTES:20971520}
logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
